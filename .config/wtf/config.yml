
wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: orange
      normal: gray
  grid:
    columns: [32, 32, 32]
    rows: [8, 8, 8, 8, 8]
  refreshInterval: 1
  mods:

    clocks:
      colors:
        rows:
          even: "lightblue"
          odd: "white"
      enabled: true
      locations:
        Poland: "Europe/Warsaw"
        Chicago: "America/Chicago"
        Saratov: "Europe/Samara"
      position:
        top: 0
        left: 1
        height: 1
        width: 1
      refreshInterval: 15
      sort: "alphabetical"
      title: "Clocks"
      type: "clocks"

    docker:
      type: docker
      enabled: true
      labelColor: lightblue
      position:
        top: 0
        left: 0
        height: 3
        width: 1
      refreshInterval: 5

    ipinfo:
      colors:
        name: "lightblue"
        value: "white"
      enabled: true
      position:
        top: 3
        left: 0
        height: 2
        width: 1
      refreshInterval: 150

    power:
      enabled: true
      position:
        top: 0
        left: 2
        height: 1
        width: 1
      refreshInterval: 15
      title: "⚡️"

