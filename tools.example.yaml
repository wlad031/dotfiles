tools:
  - name: zsh
    command: zsh
    checks:
      - type: command
        value: zsh
      - type: env
        value: SHELL
        pattern: ".*zsh$"

  - name: tmux
    command: tmux

  - name: neovim
    command: nvim
    checks:
      - type: command
        value: nvim
      - type: dir
        value: ~/.config/nvim
      - type: file
        value: ~/.config/nvim/init.lua
      - type: executable
        value: ~/.local/bin/nvim

  - name: bat
    command: bat

  - name: fzf
    command: fzf
    optional: true

  - name: rg
    command: rg
    optional: true

  - name: ripgrep-all
    command: rga
    optional: true
    checks:
      - type: command
        value: rga
      - type: file
        value: ~/.config/rga/rga.conf
      - type: cargo
        value: ripgrep-all

  - name: system zsh package (apt)
    optional: true
    checks:
      - type: apt
        value: zsh

  - name: system zsh package (pacman)
    optional: true
    checks:
      - type: pacman
        value: zsh

  - name: npm typescript
    optional: true
    checks:
      - type: npm
        value: typescript

  - name: uv ruff
    optional: true
    checks:
      - type: uv
        value: ruff

  - name: brew tmux formula
    optional: true
    checks:
      - type: brew_formula
        value: tmux

  - name: brew iterm2 cask
    optional: true
    checks:
      - type: brew_cask
        value: iterm2

  - name: snap core
    optional: true
    checks:
      - type: snap
        value: core

  - name: flatpak firefox
    optional: true
    checks:
      - type: flatpak
        value: org.mozilla.firefox

  - name: pipx httpie
    optional: true
    checks:
      - type: pipx
        value: httpie

  - name: pip venv requests
    optional: true
    checks:
      - type: pip
        value: requests
        venv: ~/.virtualenvs/myenv

  - name: uv pip venv rich
    optional: true
    checks:
      - type: uv_pip
        value: rich
        venv: ~/.virtualenvs/myenv

  - name: go gopls binary
    optional: true
    checks:
      - type: go_bin
        value: gopls

  - name: gem bundler
    optional: true
    checks:
      - type: gem
        value: bundler

  - name: systemd ssh enabled
    optional: true
    checks:
      - type: systemd_enabled
        value: ssh

  - name: systemd ssh active
    optional: true
    checks:
      - type: systemd_active
        value: ssh

  - name: ssh agent
    checks:
      - type: env
        value: SSH_AUTH_SOCK

  - name: path has local bin
    optional: true
    checks:
      - type: env
        value: PATH
        pattern: ".*~/.local/bin.*"

  - name: ssh key hash
    optional: true
    checks:
      - type: sha256
        value: ~/.ssh/id_ed25519.pub
        sha256: "<expected-hex>"
