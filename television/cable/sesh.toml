[metadata]
name = "sesh"
description = "Session manager integrating tmux sessions, zoxide directories, and OpenCode sessions"
requirements = ["sesh"]

[source]
command = [
  "sesh list --icons",
  "~/.config/television/scripts/oc-tv-source",
]
ansi = true
output = "{strip_ansi|split: :1..|join: }"

[preview]
command = '''
item="{}"

if printf "%s" "$item" | grep -q "opencode"; then
  ~/.config/television/scripts/oc-tv-preview "$item"
else
  sesh preview '{strip_ansi|split: :1..|join: }'
fi
'''

[keybindings]
enter = "actions:connect"
ctrl-d = ["actions:kill_session", "reload_source"]

[actions.connect]
description = "Connect to selected session"
mode = "execute"
command = '''
item="{}"

if printf "%s" "$item" | grep -q "opencode"; then
  scope="$(printf "%s" "$item" | awk '{print $2}' | cut -d: -f2)"
  sid="$(printf "%s" "$item" | awk -F ' │ ' '{print $(NF-1)}')"

  cache_dir="${XDG_CACHE_HOME:-$HOME/.cache}/opencode-tv"
  cache="$cache_dir/${scope}.json"

  title="$(jq -r --arg sid "$sid" \
    '.[] | select(.id == $sid) | (.title // .slug // .id)' "$cache" | head -n1)"

  if [ -z "$sid" ] || [ "$sid" = "null" ]; then
    printf "Unable to resolve OpenCode session id from selection\n" >&2
    exit 1
  fi

  # sanitize title for tmux
  tmux_name="$(
    printf "%s" "$title" \
      | tr '[:upper:]' '[:lower:]' \
      | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g; s/-+/-/g'
  )"

  # fallback if empty
  if [ -z "$tmux_name" ]; then
    tmux_name="oc-$sid"
  fi

  if ! tmux has-session -t "$tmux_name" 2>/dev/null; then
    if [ "$scope" = "local" ]; then
      tmux new-session -d -s "$tmux_name" /sbin/opencode --session "$sid"
    else
      tmux new-session -d -s "$tmux_name" /sbin/opencode attach "https://opencode.local.vgerasimov.dev" --session "$sid"
    fi
  fi

  tmux switch-client -t "$tmux_name"

else
  sesh connect "$(printf "%s" "$item" | sed 's/^[^ ]* //')"
fi
'''

[actions.kill_session]
description = "Kill selected tmux session"
command = "tmux kill-session -t '{strip_ansi|split: :1..|join: }'"
mode = "fork"
