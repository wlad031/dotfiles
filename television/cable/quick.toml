description = "Open in new tmux window"
command = """
target_pane() {
  if [ -n "${TV_TMUX_TARGET_PANE:-}" ]; then
    printf '%s' "$TV_TMUX_TARGET_PANE"
    return 0
  fi
  if [ -n "${TMUX:-}" ]; then
