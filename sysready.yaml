tools:
  - name: antigen
    load: true

  - name: ohmyposh
    load: true

  - name: git
    load: true

  - name: eza
    load: true

  - name: bat
    load: true
    checks:
      - type: command
        value: bat

  - name: tmux
    load: true
    checks:
      - type: command
        value: tmux

  - name: cargo
    load: true

  - name: limactl
    load:
      setup: lima_setup

  - name: colima
    load: true

  - name: rancher
    load: true

  - name: docker
    load: true

  - name: lazydocker
    load: true

  - name: fzf
    load: true
    optional: true
    checks:
      - type: command
        value: fzf

  - name: lazygit
    load: true

  - name: neovim
    load: true
    checks:
      - type: command
        value: nvim
      - type: dir
        value: ~/.config/nvim
      - type: file
        value: ~/.config/nvim/init.lua
      - type: executable
        value: ~/.local/bin/nvim

  - name: codium
    load: true

  - name: fnm
    load: true

  - name: devmoji
    load: true

  - name: flutter
    load: true

  - name: g
    load: true

  - name: sesh
    load: true

  - name: sdkman
    load: true

  - name: pyenv
    load: true

  - name: gcloud
    load: true

  - name: rvm
    load: true

  - name: coursier
    load: true

  - name: thefuck
    load: true

  - name: fastfetch
    load: true

  - name: zoxide
    load: true

  - name: yazi
    load: true

  - name: jetbrains
    load: true

  - name: luaver
    load: true

  - name: sshs
    load: true

  - name: aerospace
    load: true

  - name: zsh_vi
    load: true

  - name: ansible
    load: true

  - name: tldr
    load: true

  - name: tenv
    load: true

  - name: notes
    load: true

  - name: occ
    load: true

  - name: opencode
    load: true

  - name: ask
    load:
      setup: ask_sh_setup

  - name: neofetch
    load: true

  - name: zsh
    checks:
      - type: command
        value: zsh
      - type: env
        value: SHELL
        pattern: ".*zsh$"

  - name: rg
    optional: true
    checks:
      - type: command
        value: rg

  - name: ripgrep-all
    optional: true
    checks:
      - type: command
        value: rga
      - type: file
        value: ~/.config/rga/rga.conf
      - type: cargo
        value: ripgrep-all

  - name: system zsh package (apt)
    optional: true
    checks:
      - type: apt
        value: zsh

  - name: system zsh package (pacman)
    optional: true
    checks:
      - type: pacman
        value: zsh

  - name: npm typescript
    optional: true
    checks:
      - type: npm
        value: typescript

  - name: uv ruff
    optional: true
    checks:
      - type: uv
        value: ruff

  - name: brew tmux formula
    optional: true
    checks:
      - type: brew_formula
        value: tmux

  - name: brew iterm2 cask
    optional: true
    checks:
      - type: brew_cask
        value: iterm2

  - name: snap core
    optional: true
    checks:
      - type: snap
        value: core

  - name: flatpak firefox
    optional: true
    checks:
      - type: flatpak
        value: org.mozilla.firefox

  - name: pipx httpie
    optional: true
    checks:
      - type: pipx
        value: httpie

  - name: pip venv requests
    optional: true
    checks:
      - type: pip
        value: requests
        venv: ~/.virtualenvs/myenv

  - name: uv pip venv rich
    optional: true
    checks:
      - type: uv_pip
        value: rich
        venv: ~/.virtualenvs/myenv

  - name: go gopls binary
    optional: true
    checks:
      - type: go_bin
        value: gopls

  - name: gem bundler
    optional: true
    checks:
      - type: gem
        value: bundler

  - name: systemd ssh enabled
    optional: true
    checks:
      - type: systemd_enabled
        value: ssh

  - name: systemd ssh active
    optional: true
    checks:
      - type: systemd_active
        value: ssh

  - name: ssh agent
    checks:
      - type: env
        value: SSH_AUTH_SOCK

  - name: path has local bin
    optional: true
    checks:
      - type: env
        value: PATH
        pattern: ".*~/.local/bin.*"

  - name: ssh key hash
    optional: true
    checks:
      - type: sha256
        value: ~/.ssh/id_ed25519.pub
        sha256: "<expected-hex>"
