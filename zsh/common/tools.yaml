tools:

  git:
    load: true

  dredge:
    checks:
      - type: command
        value: dredge

  eza:
    load: true

  bat:
    load: true
    checks:
      - type: command
        value: bat

  tmux:
    load: true
    checks:
      - type: command
        value: tmux

  cargo:
    load: true

  fzf:
    load: true
    optional: true
    checks:
      - type: command
        value: fzf

  neovim:
    load: true
    checks:
      - type: command
        value: nvim

  zsh:
    checks:
      - type: command
        value: zsh
      - type: env
        value: SHELL
        pattern: ".*zsh$"

  serpl:
    checks:
      - type: command
        value: serpl

  dig:
    checks:
      - type: command
        value: dig
        fix: "sudo apt-get update && sudo apt-get install -y dnsutils"

  nslookup:
    checks:
      - type: command
        value: nslookup
        fix: "sudo apt-get update && sudo apt-get install -y dnsutils"

  k9s:
    checks:
      - type: command
        value: k9s

  flux9s:
    checks:
      - type: command
        value: k9s

  mediainfo:
    checks:
      - type: command
        value: mediainfo

  yazi:
    load: true
    checks:
      - type: command
        value: yazi
      - type: bash
        value: 'ya pkg list | grep -q "boydaihungst/mediainfo"'
        fix: 'ya pkg add boydaihungst/mediainfo'
      - type: bash
        value: 'ya pkg list | grep -q "bennyyip/gruvbox-dark"'
        fix: 'ya pkg add bennyyip/gruvbox-dark'

